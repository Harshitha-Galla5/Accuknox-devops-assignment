apiVersion: security.kubearmor.com/v1
kind: KubeArmorPolicy

metadata:
  name: block-shell-exec
  namespace: default

spec:
  selector:
    matchLabels:
      app: wisecow

  process:
    matchPaths:
    - path: /bin/sh

  action: Block

---

apiVersion: security.kubearmor.com/v1
kind: KubeArmorPolicy

metadata:
  name: block-package-manager
  namespace: default

spec:
  selector:
    matchLabels:
      app: wisecow

  process:
    matchPaths:
    - path: /usr/bin/apt
    - path: /usr/bin/apt-get

  action: Block

---

apiVersion: security.kubearmor.com/v1
kind: KubeArmorPolicy

metadata:
  name: block-sensitive-files
  namespace: default

spec:
  selector:
    matchLabels:
      app: wisecow

  file:
    matchPaths:
    - path: /etc/passwd
    - path: /etc/shadow

  action: Block
