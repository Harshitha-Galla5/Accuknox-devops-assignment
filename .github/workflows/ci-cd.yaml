name: Wisecow CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  build-and-deploy:

    runs-on: self-hosted

    steps:

    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/wisecow:latest .
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/wisecow:latest \
        ${{ secrets.DOCKERHUB_USERNAME }}/wisecow:${{ github.run_number }}

    - name: Push Docker Images
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/wisecow:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/wisecow:${{ github.run_number }}

    - name: Verify Kubernetes Cluster
      run: |
        kubectl cluster-info

    - name: Update Kubernetes Deployment
      run: |
        kubectl set image deployment/wisecow-deployment \
        wisecow=${{ secrets.DOCKERHUB_USERNAME }}/wisecow:${{ github.run_number }}

    - name: Verify Rollout Status
      run: |
        kubectl rollout status deployment/wisecow-deployment

    - name: Verify Pods
      run: |
        kubectl get pods
